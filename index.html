<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Kit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>UI Kit</h1>
  <h2>Компоненты интерфейса</h2>

  <!-- КНОПКИ -->
  <h3>Кнопки</h3>
  <button class="btn btn-primary">Primary</button>
  <button class="btn btn-secondary">Secondary</button>
  <button class="btn btn-danger">Danger</button>
  <button class="btn btn-success">Success</button>
  <button class="btn btn-outline">Outline</button>

  <br><br>

  <!-- КАРТОЧКА -->
  <h3>Карточка</h3>
  <div class="card">
    <div class="card__title">Заголовок карточки</div>
    <div class="card__text">Это текст внутри карточки. Здесь может быть любое описание.</div>
  </div>

  <!-- БЕЙДЖИ -->
  <h3>Бейджи</h3>
  <span class="badge badge-primary">Primary</span>
  <span class="badge badge-danger">Danger</span>
  <span class="badge badge-success">Success</span>

  <br><br>

  <!-- АЛЕРТЫ -->
  <h3>Алерты</h3>
  <div class="alert alert-info">Информационное сообщение</div>
  <div class="alert alert-danger">Сообщение об ошибке</div>
  <div class="alert alert-success">Успешное действие</div>

  <!-- ФОРМА -->
  <h3>Форма</h3>
  <div class="form-group">
    <label>Имя</label>
    <input type="text" placeholder="Введите имя">
  </div>
  <div class="form-group">
    <label>Сообщение</label>
    <textarea placeholder="Введите сообщение"></textarea>
  </div>
  <button class="btn btn-primary">Отправить</button>

</body>
</html>
